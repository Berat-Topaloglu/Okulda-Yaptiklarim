<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <style>
        .tablo {
            border: 5px,dotted,green;
            width: 800px;
        }

        .gs {
            font-size: 14px;
            font-family: 'Comic Sans MS';
            color: yellow;
            background: red;
            text-transform: capitalize;
            text-align: justify;
            text-indent: 20px;
        }

        .fb {
            font-size: 16px;
            font-family: Arial;
            color: blue;
            background: yellow;
            text-align: center;
        }

        .bjk {
            font-size: 12px;
            color: white;
            background: black;
            text-align: right;
        }
    </style>
</head>
<body>
    <table class="tablo">
        <tr>
            <td>
                <h1 class="gs">Galatasaray</h1>
                <h1 class="fb">Fenerbahçe</h1>
                <h1 class="bjk">Beşiktaş</h1>
            </td>
        </tr>
    </table>
</body>
</html>
